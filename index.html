<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
    <title>QR Code Generator</title>
  </head>
  <body>
    <div class="container">
      <div class="qr-input-container">
        <input type="text" id="qr-input" required />
        <label
          class="qr-heading-label"
          for="qr-input"
          data-placeholder="Enter Text or URL"
        ></label>
      </div>
      <div id="qr-image-container">
        <img id="qr-img" src="" alt="QR Code" />
      </div>
      <button id="generate-btn" onclick="generateQR()">Generate QR Code</button>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
