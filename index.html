<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
    <title>QR Code Generator</title>
  </head>
  <body>
    <div class="container">
      <div class="qr-input-container">
        <input type="text" id="qr-input" required />
        <label for="qr-input" data-placeholder="Enter Text or URL"></label>
      </div>

      <!-- 🔽 Format Selector -->
      <div class="select-wrapper">
        <select id="format-select">
          <option value="png">PNG</option>
          <option value="jpg">JPG</option>
          <option value="svg">SVG</option>
        </select>
      </div>

      <div class="select-wrapper">
        <select id="quality-select">
          <option value="256">Low (256px)</option>
          <option value="512" selected>Medium (512px)</option>
          <option value="1024">High (1024px)</option>
        </select>
      </div>

      <!-- 🔄 Loader -->
      <div id="loader" style="display: none">Generating...</div>

      <div id="qr-image-container">
        <img id="qr-img" src="" alt="QR Code" />
      </div>

      <button onclick="generateQR()">Generate QR Code</button>
      <button id="download-btn" style="display: none">Download QR</button>
    </div>

    <!-- QR Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <script src="./script.js"></script>
  </body>
</html>
